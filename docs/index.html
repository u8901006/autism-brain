<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Autism Brain · 自閉症文獻日報</title>
<style>
  :root { --bg: #eef4f8; --surface: #f7fbff; --line: #c4d8e8; --text: #1a2d3d; --muted: #5a7a90; --accent: #2a7ab5; --accent-soft: #d4e8f5; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: radial-gradient(circle at top, #f0f7ff 0, var(--bg) 55%, #d8e8f4 100%); color: var(--text); font-family: "Noto Sans TC", "PingFang TC", "Helvetica Neue", Arial, sans-serif; min-height: 100vh; }
  .container { position: relative; z-index: 1; max-width: 640px; margin: 0 auto; padding: 80px 24px; }
  .logo { font-size: 48px; text-align: center; margin-bottom: 16px; }
  h1 { text-align: center; font-size: 24px; color: var(--text); margin-bottom: 8px; }
  .subtitle { text-align: center; color: var(--accent); font-size: 14px; margin-bottom: 48px; }
  .count { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 32px; }
  .placeholder { text-align: center; padding: 40px; background: var(--surface); border: 1px solid var(--line); border-radius: 16px; margin-bottom: 32px; }
  .placeholder p { font-size: 15px; color: var(--muted); line-height: 1.8; }
  .clinic-links { margin-top: 40px; display: flex; flex-direction: column; gap: 10px; }
  .clinic-a { display: flex; align-items: center; gap: 10px; color: var(--text); text-decoration: none; padding: 14px 20px; background: var(--surface); border: 1px solid var(--line); border-radius: 12px; transition: all 0.2s; font-size: 14px; }
  .clinic-a:hover { background: var(--accent-soft); border-color: var(--accent); }
  .clinic-a span:first-child { font-size: 20px; }
  footer { margin-top: 56px; text-align: center; font-size: 12px; color: var(--muted); }
  footer a { display: inline; padding: 0; background: none; border: none; color: var(--muted); }
  footer a:hover { color: var(--accent); }
</style>
</head>
<body>
<div class="container">
  <div class="logo">🧩</div>
  <h1>Autism Brain</h1>
  <p class="subtitle">自閉症譜系障礙文獻日報 · 每日自動更新</p>
  <div class="placeholder">
    <p>🚀 系統建置中，即將開始每日自動更新。<br/>首次報告將在下一個排程時間自動生成。</p>
  </div>
  <div class="clinic-links">
    <a href="https://www.leepsyclinic.com/" class="clinic-a" target="_blank">
      <span>🏥</span>
      <span>李政洋身心診所首頁</span>
    </a>
    <a href="https://blog.leepsyclinic.com/" class="clinic-a" target="_blank">
      <span>📬</span>
      <span>訂閱電子報</span>
    </a>
  </div>
  <footer>
    <p>Powered by PubMed + Zhipu AI · <a href="https://github.com/u8901006/autism-brain">GitHub</a></p>
  </footer>
</div>
</body>
</html>
